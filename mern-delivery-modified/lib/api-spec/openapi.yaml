openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Food Delivery API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: restaurants
  - name: menu
  - name: categories
  - name: cart
  - name: orders
  - name: reviews
  - name: stats

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── Restaurants ───────────────────────────────────────────────────────────
  /restaurants:
    get:
      operationId: listRestaurants
      tags: [restaurants]
      summary: List restaurants
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantListResponse"
    post:
      operationId: createRestaurant
      tags: [restaurants]
      summary: Create restaurant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestaurantInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"

  /restaurants/{id}:
    get:
      operationId: getRestaurant
      tags: [restaurants]
      summary: Get restaurant by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"
    patch:
      operationId: updateRestaurant
      tags: [restaurants]
      summary: Update restaurant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestaurantUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"
    delete:
      operationId: deleteRestaurant
      tags: [restaurants]
      summary: Delete restaurant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /restaurants/{id}/stats:
    get:
      operationId: getRestaurantStats
      tags: [restaurants]
      summary: Get restaurant stats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantStats"

  # ── Menu Categories ────────────────────────────────────────────────────────
  /restaurants/{restaurantId}/categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List menu categories for a restaurant
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuCategory"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create menu category
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuCategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuCategory"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuCategoryUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuCategory"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Menu Items ────────────────────────────────────────────────────────────
  /restaurants/{restaurantId}/menu:
    get:
      operationId: listMenuItems
      tags: [menu]
      summary: List menu items for a restaurant
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
    post:
      operationId: createMenuItem
      tags: [menu]
      summary: Create menu item
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"

  /menu/{id}:
    patch:
      operationId: updateMenuItem
      tags: [menu]
      summary: Update menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
    delete:
      operationId: deleteMenuItem
      tags: [menu]
      summary: Delete menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Cart ──────────────────────────────────────────────────────────────────
  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get current user's cart
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: clearCart
      tags: [cart]
      summary: Clear cart
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /cart/items:
    post:
      operationId: addToCart
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/items/{itemId}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item quantity
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Remove item from cart
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  # ── Orders ────────────────────────────────────────────────────────────────
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders for current user or restaurant
      parameters:
        - name: restaurantId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ── Reviews ───────────────────────────────────────────────────────────────
  /restaurants/{restaurantId}/reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List reviews for a restaurant
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Post a review
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  # ── Platform Stats ────────────────────────────────────────────────────────
  /stats/platform:
    get:
      operationId: getPlatformStats
      tags: [stats]
      summary: Platform-wide stats (admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /stats/popular-items:
    get:
      operationId: getPopularItems
      tags: [stats]
      summary: Top popular menu items
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PopularItem"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # ── Auth ────────────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [customer, restaurant_owner, admin]
          default: customer
        phone:
          type: string
        address:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    User:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [customer, restaurant_owner, admin]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        avatar:
          type: ["string", "null"]
        createdAt:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # ── Restaurants ─────────────────────────────────────────────────────────
    Restaurant:
      type: object
      required: [id, name, cuisine, deliveryTime, deliveryFee, rating, isOpen]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        cuisine:
          type: string
        image:
          type: ["string", "null"]
        coverImage:
          type: ["string", "null"]
        address:
          type: string
        phone:
          type: ["string", "null"]
        deliveryTime:
          type: integer
          description: Estimated delivery time in minutes
        deliveryFee:
          type: number
        minOrder:
          type: number
        rating:
          type: number
        reviewCount:
          type: integer
        isOpen:
          type: boolean
        ownerId:
          type: ["string", "null"]
        createdAt:
          type: string

    RestaurantInput:
      type: object
      required: [name, cuisine, address, deliveryTime, deliveryFee]
      properties:
        name:
          type: string
        description:
          type: string
        cuisine:
          type: string
        image:
          type: string
        coverImage:
          type: string
        address:
          type: string
        phone:
          type: string
        deliveryTime:
          type: integer
        deliveryFee:
          type: number
        minOrder:
          type: number

    RestaurantUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        cuisine:
          type: string
        image:
          type: string
        coverImage:
          type: string
        address:
          type: string
        phone:
          type: string
        deliveryTime:
          type: integer
        deliveryFee:
          type: number
        minOrder:
          type: number
        isOpen:
          type: boolean

    RestaurantListResponse:
      type: object
      required: [restaurants, total, page, limit]
      properties:
        restaurants:
          type: array
          items:
            $ref: "#/components/schemas/Restaurant"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    RestaurantStats:
      type: object
      required: [totalOrders, totalRevenue, avgRating, pendingOrders]
      properties:
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        avgRating:
          type: number
        pendingOrders:
          type: integer
        todayOrders:
          type: integer
        todayRevenue:
          type: number

    # ── Menu Categories ──────────────────────────────────────────────────────
    MenuCategory:
      type: object
      required: [id, name, restaurantId]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        restaurantId:
          type: string
        sortOrder:
          type: integer

    MenuCategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        sortOrder:
          type: integer

    MenuCategoryUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        sortOrder:
          type: integer

    # ── Menu Items ────────────────────────────────────────────────────────────
    MenuItem:
      type: object
      required: [id, name, price, restaurantId, isAvailable]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        image:
          type: ["string", "null"]
        restaurantId:
          type: string
        categoryId:
          type: ["string", "null"]
        isAvailable:
          type: boolean
        isPopular:
          type: boolean
        isVegetarian:
          type: boolean
        calories:
          type: ["integer", "null"]
        prepTime:
          type: ["integer", "null"]

    MenuItemInput:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        image:
          type: string
        categoryId:
          type: string
        isAvailable:
          type: boolean
        isPopular:
          type: boolean
        isVegetarian:
          type: boolean
        calories:
          type: integer
        prepTime:
          type: integer

    MenuItemUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        image:
          type: string
        categoryId:
          type: string
        isAvailable:
          type: boolean
        isPopular:
          type: boolean
        isVegetarian:
          type: boolean
        calories:
          type: integer
        prepTime:
          type: integer

    # ── Cart ──────────────────────────────────────────────────────────────────
    CartItem:
      type: object
      required: [id, menuItemId, name, price, quantity]
      properties:
        id:
          type: string
        menuItemId:
          type: string
        name:
          type: string
        price:
          type: number
        quantity:
          type: integer
        image:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    Cart:
      type: object
      required: [items, subtotal, deliveryFee, total]
      properties:
        restaurantId:
          type: ["string", "null"]
        restaurantName:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotal:
          type: number
        deliveryFee:
          type: number
        total:
          type: number

    CartItemInput:
      type: object
      required: [menuItemId, restaurantId, quantity]
      properties:
        menuItemId:
          type: string
        restaurantId:
          type: string
        quantity:
          type: integer
        notes:
          type: string

    CartItemUpdate:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer

    # ── Orders ────────────────────────────────────────────────────────────────
    OrderItem:
      type: object
      required: [menuItemId, name, price, quantity]
      properties:
        menuItemId:
          type: string
        name:
          type: string
        price:
          type: number
        quantity:
          type: integer
        image:
          type: ["string", "null"]

    Order:
      type: object
      required: [id, userId, restaurantId, restaurantName, items, status, subtotal, deliveryFee, total, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        restaurantId:
          type: string
        restaurantName:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, out_for_delivery, delivered, cancelled]
        subtotal:
          type: number
        deliveryFee:
          type: number
        total:
          type: number
        deliveryAddress:
          type: string
        notes:
          type: ["string", "null"]
        estimatedDelivery:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    OrderInput:
      type: object
      required: [restaurantId, deliveryAddress]
      properties:
        restaurantId:
          type: string
        deliveryAddress:
          type: string
        notes:
          type: string

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, out_for_delivery, delivered, cancelled]

    OrderListResponse:
      type: object
      required: [orders, total, page, limit]
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── Reviews ───────────────────────────────────────────────────────────────
    Review:
      type: object
      required: [id, userId, userName, restaurantId, rating, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        userName:
          type: string
        userAvatar:
          type: ["string", "null"]
        restaurantId:
          type: string
        rating:
          type: integer
        comment:
          type: ["string", "null"]
        createdAt:
          type: string

    ReviewInput:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
        comment:
          type: string

    # ── Stats ─────────────────────────────────────────────────────────────────
    PlatformStats:
      type: object
      required: [totalUsers, totalRestaurants, totalOrders, totalRevenue]
      properties:
        totalUsers:
          type: integer
        totalRestaurants:
          type: integer
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        activeRestaurants:
          type: integer
        todayOrders:
          type: integer

    PopularItem:
      type: object
      required: [menuItemId, name, restaurantName, orderCount, price]
      properties:
        menuItemId:
          type: string
        name:
          type: string
        restaurantName:
          type: string
        orderCount:
          type: integer
        price:
          type: number
        image:
          type: ["string", "null"]
