services:
  - type: web
    name: quickbite-api
    runtime: node
    plan: free
    buildCommand: |
      corepack enable
      pnpm install
      pnpm --filter @workspace/api-server build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api/healthz
